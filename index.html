<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reis Pizzaria | Pedido Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-site: #000000; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-site); color: #fff; transition: background 0.8s ease; overflow-x: hidden; }
        .promo-topo { font-size: 11px; font-weight: 900; text-align: center; padding: 12px; text-transform: uppercase; width: 100%; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
        #modal-cliente { backdrop-filter: blur(25px); z-index: 999; background-color: rgba(0,0,0,0.98); }
        .metodo-off { border: 2px solid #27272a; color: #52525b; background: rgba(255,255,255,0.05); }
        .metodo-on { border: 2px solid #ef4444; color: #fff; background: #ef4444; }
        .item-card { background: rgba(255,255,255,0.05); border: 2px solid #27272a; border-radius: 20px; padding: 16px; transition: 0.2s; cursor: pointer; }
        .item-card.selected { border-color: #ef4444; background: rgba(239, 68, 68, 0.15); }
        .padding-final { padding-bottom: 280px; }
        input:focus, select:focus { outline: none; border-color: #fbbf24 !important; }
        .tab-title { font-size: 10px; font-weight: 900; color: #fbbf24; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; margin-top: 20px; }
    </style>
</head>
<body class="padding-final">

    <div id="banner-promo" class="promo-topo hidden"></div>

    <header class="flex flex-col items-center py-6 bg-black/40 border-b border-white/5 relative">
        <a href="admin.html" class="absolute top-3 right-3 text-[8px] bg-white/10 px-2 py-1.5 rounded uppercase font-bold border border-white/5 text-zinc-500">ADM</a>
        <h1 class="text-2xl font-black italic text-yellow-500 uppercase tracking-tighter">REIS PIZZARIA</h1>
        <div id="status-loja" class="mt-1 text-[9px] font-bold uppercase">Verificando...</div>
    </header>

    <div id="modal-cliente" class="fixed inset-0 flex items-center justify-center p-5">
        <div class="bg-[#18181b] w-full max-w-md p-8 rounded-[2.5rem] border border-white/10 shadow-2xl">
            <h2 class="text-2xl font-black mb-8 text-center italic text-yellow-500 uppercase">BEM-VINDO! 🍕</h2>
            <div class="flex gap-3 mb-6">
                <button id="btn-entrega" onclick="mudarMetodo('entrega')" class="flex-1 py-4 rounded-2xl font-black text-xs metodo-on">ENTREGA</button>
                <button id="btn-retirada" onclick="mudarMetodo('retirada')" class="flex-1 py-4 rounded-2xl font-black text-xs metodo-off">RETIRADA</button>
            </div>
            <div class="space-y-4">
                <input type="text" id="c-nome" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-sm text-white" placeholder="Seu Nome">
                <div id="box-endereco">
                    <input type="text" id="c-rua" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-sm mb-3 text-white" placeholder="Rua e Número">
                    <input type="text" id="c-bairro" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-sm text-white" placeholder="Bairro">
                </div>
            </div>
            <button onclick="comecar()" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl mt-8 uppercase italic shadow-lg shadow-yellow-500/20 active:scale-95 transition-all">Ver Cardápio</button>
        </div>
    </div>

    <main class="max-w-xl mx-auto p-4">
        <section id="secao-tamanhos" class="mt-4">
            <h3 class="text-[11px] font-black mb-4 border-l-4 border-yellow-500 pl-2 uppercase text-zinc-400 italic">1. Escolha o Tamanho</h3>
            <div id="lista-tamanhos" class="grid grid-cols-3 gap-2"></div>
        </section>

        <section id="secao-sabores" class="mt-10 hidden">
            <div class="flex justify-between items-end mb-4">
                <h3 class="text-[11px] font-black border-l-4 border-yellow-500 pl-2 uppercase text-zinc-400 italic">2. Escolha os Sabores</h3>
                <span id="contador-sabores" class="text-[10px] bg-red-600 px-2 py-1 rounded font-bold">0/0</span>
            </div>
            
            <div class="mb-6">
                <h4 class="tab-title">🍕 Pizzas Salgadas</h4>
                <div id="lista-sabores-salgados" class="space-y-2"></div>
                
                <h4 class="tab-title">🍫 Pizzas Doces</h4>
                <div id="lista-sabores-doces" class="space-y-2"></div>

                <h4 class="tab-title">💎 Doces Premium</h4>
                <div id="lista-sabores-premium" class="space-y-2"></div>
            </div>
        </section>

        <section id="secao-bordas" class="mt-10 hidden">
            <h3 class="text-[11px] font-black mb-4 border-l-4 border-yellow-500 pl-2 uppercase text-zinc-400 italic">3. Borda Recheada?</h3>
            <div id="lista-bordas" class="space-y-2"></div>
        </section>

        <section id="secao-bebidas" class="mt-10 hidden">
            <h3 class="text-[11px] font-black mb-4 border-l-4 border-yellow-500 pl-2 uppercase text-zinc-400 italic">4. Bebidas</h3>
            <div id="lista-bebidas" class="space-y-2"></div>
        </section>
    </main>

    <div id="barra-pedido" class="fixed bottom-0 inset-x-0 bg-zinc-900/95 backdrop-blur-xl border-t border-white/10 p-4 hidden z-[150]">
        <div class="max-w-xl mx-auto">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-black/40 p-3 rounded-2xl border border-white/5">
                    <label class="text-[9px] font-black text-zinc-500 uppercase block mb-1">Cupom</label>
                    <input type="text" id="cupom-input" class="bg-zinc-800 text-white text-xs p-2.5 rounded-xl w-full border-none mb-2 uppercase" placeholder="CÓDIGO">
                    <button onclick="validarCupom()" class="w-full bg-zinc-700 text-[9px] py-1.5 rounded-lg font-black uppercase text-yellow-500">Aplicar</button>
                </div>
                <div class="bg-black/40 p-3 rounded-2xl border border-white/5">
                    <label class="text-[9px] font-black text-zinc-500 uppercase block mb-1">Pagamento</label>
                    <select id="select-pag" onchange="verTroco()" class="bg-zinc-800 text-white text-xs p-2.5 rounded-xl w-full border-none">
                        <option value="Pix">Pix</option>
                        <option value="Cartão">Cartão</option>
                        <option value="Dinheiro">Dinheiro</option>
                    </select>
                    <div id="box-troco" class="hidden mt-2">
                        <input type="number" id="troco-input" class="bg-zinc-800 text-white text-[10px] p-2 rounded-lg w-full border border-yellow-500/30" placeholder="Troco para quanto?">
                    </div>
                </div>
            </div>
            <div class="flex justify-between items-center gap-4">
                <div class="flex flex-col">
                    <span id="txt-taxa" class="text-[10px] text-zinc-500 font-bold uppercase">Taxa: R$ 0,00</span>
                    <span id="txt-total" class="text-2xl font-black text-yellow-500">R$ 0,00</span>
                </div>
                <button onclick="cliqueFinalizar()" class="flex-1 bg-red-600 text-white font-black py-4 rounded-2xl uppercase italic text-sm">Finalizar Pedido</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
