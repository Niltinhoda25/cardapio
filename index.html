<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reis Pizzaria | Pedido Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #000; color: #fff; -webkit-tap-highlight-color: transparent; }
        .method-active { background-color: #dc2626 !important; border-color: #dc2626 !important; color: white !important; }
        .hidden { display: none; }
        input:focus { border-color: #fbbf24; outline: none; }
        /* ESPAÇO NO FUNDO PARA AS BEBIDAS NÃO FICAREM ATRÁS DA BARRA */
        .espaco-final { padding-bottom: 220px; }
    </style>
</head>
<body class="espaco-final">

    <header class="flex flex-col items-center py-6 bg-zinc-900 border-b border-zinc-800 relative">
        <a href="admin.html" class="absolute top-3 right-3 bg-zinc-800/50 text-[7px] font-bold px-2 py-1.5 rounded-md border border-zinc-700/50 text-zinc-400 uppercase">ADM</a>
        <h1 class="text-xl font-black italic text-yellow-500 uppercase tracking-tighter">REIS PIZZARIA</h1>
        <div id="status-badge" class="mt-2 text-[10px] font-bold uppercase tracking-widest">Verificando...</div>
    </header>

    <div id="login-modal" class="fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-4">
        <div class="bg-zinc-900 w-full max-w-md p-6 rounded-3xl border border-zinc-800 shadow-2xl">
            <h2 class="text-xl font-black mb-6 text-center italic uppercase">Seja Bem-vindo! 🍕</h2>
            <div class="mb-6">
                <label class="text-[10px] font-bold text-zinc-500 block mb-2 uppercase text-center">Como deseja receber?</label>
                <div class="flex gap-2">
                    <button onclick="setMetodo('entrega')" id="btn-entrega" class="flex-1 py-3 rounded-xl border-2 border-zinc-800 font-bold text-xs method-active">ENTREGA</button>
                    <button onclick="setMetodo('retirada')" id="btn-retirada" class="flex-1 py-3 rounded-xl border-2 border-zinc-800 font-bold text-xs">RETIRADA</button>
                </div>
            </div>
            <div class="space-y-4">
                <input type="text" id="cust-name" class="w-full bg-black border border-zinc-800 p-3 rounded-xl text-sm" placeholder="Seu Nome">
                <div id="campos-endereco">
                    <input type="text" id="cust-street" class="w-full bg-black border border-zinc-800 p-3 rounded-xl text-sm mb-3" placeholder="Rua e número">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="cust-bairro" class="bg-black border border-zinc-800 p-3 rounded-xl text-sm" placeholder="Bairro">
                        <input type="text" id="cust-ref" class="bg-black border border-zinc-800 p-3 rounded-xl text-sm" placeholder="Referência">
                    </div>
                </div>
            </div>
            <button onclick="saveClientData()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl mt-8 uppercase italic">Ver Cardápio</button>
        </div>
    </div>

    <main class="max-w-xl mx-auto p-4">
        <section id="size-section" class="mt-4">
            <h3 class="text-sm font-black mb-4 border-l-4 border-yellow-500 pl-2 uppercase italic">1. Tamanho</h3>
            <div id="sizes-container" class="grid grid-cols-3 gap-2"></div>
        </section>

        <section id="flavors-section" class="mt-8 hidden">
            <div class="flex justify-between items-end mb-4">
                <h3 class="text-sm font-black border-l-4 border-yellow-500 pl-2 uppercase italic">2. Sabores</h3>
                <span id="flavor-count" class="text-[10px] bg-red-600 px-2 py-1 rounded font-bold">0/0</span>
            </div>
            <div id="flavors-container" class="space-y-2"></div>
        </section>

        <section id="bordas-section" class="mt-8 hidden">
            <h3 class="text-sm font-black mb-4 border-l-4 border-yellow-500 pl-2 uppercase italic">3. Borda Recheada?</h3>
            <div id="bordas-container" class="space-y-2"></div>
        </section>

        <section id="bebidas-section" class="mt-8 hidden">
            <h3 class="text-sm font-black mb-4 border-l-4 border-yellow-500 pl-2 uppercase italic">4. Bebidas</h3>
            <div id="bebidas-container" class="space-y-2"></div>
        </section>
    </main>

    <div id="cart-bar" class="fixed bottom-0 inset-x-0 bg-zinc-900 border-t border-zinc-800 p-3 hidden z-40">
        <div class="max-w-xl mx-auto">
            <div class="grid grid-cols-2 gap-2 mb-3">
                <div class="bg-black/50 p-2 rounded-xl border border-zinc-800">
                    <label class="text-[7px] font-bold text-zinc-500 uppercase block mb-1">Cupom</label>
                    <div class="flex gap-1">
                        <input type="text" id="input-cupom" class="bg-zinc-900 text-white text-[10px] p-1.5 rounded flex-1 uppercase" placeholder="Código">
                        <button onclick="aplicarCupom()" class="bg-yellow-500 text-black text-[9px] px-2 rounded font-black">OK</button>
                    </div>
                </div>
                <div class="bg-black/50 p-2 rounded-xl border border-zinc-800">
                    <label class="text-[7px] font-bold text-zinc-500 uppercase block mb-1">Pagamento</label>
                    <select id="pagamento" onchange="toggleTroco()" class="bg-zinc-900 text-white text-[10px] p-1.5 rounded w-full border-none">
                        <option value="Pix">Pix</option>
                        <option value="Cartão">Cartão</option>
                        <option value="Dinheiro">Dinheiro</option>
                    </select>
                </div>
            </div>
            
            <div id="div-troco" class="hidden mb-3">
                <input type="number" id="troco-para" class="w-full bg-black border border-zinc-800 p-2 rounded-xl text-xs text-center" placeholder="Troco para quanto?">
            </div>

            <div class="flex justify-between items-center gap-3">
                <div class="flex flex-col">
                    <span id="delivery-text" class="text-[8px] text-zinc-500 font-bold uppercase">Taxa: R$ 0,00</span>
                    <span id="total-price" class="text-xl font-black text-yellow-500">R$ 0,00</span>
                </div>
                <button onclick="sendOrder()" class="flex-1 bg-red-600 text-white font-black py-3 rounded-xl uppercase text-xs italic shadow-lg active:scale-95 transition-all">Finalizar Pedido</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
