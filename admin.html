<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REIS MASTER | Controle Total</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; }
        .box { background: #111113; border: 1px solid #27272a; border-radius: 20px; padding: 15px; }
        .input-adm { background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; width: 100%; font-size: 11px; outline: none; }
        .input-adm:focus { border-color: #fbbf24; }
        .btn-add { color: #fff; font-weight: 900; padding: 8px; border-radius: 8px; width: 100%; text-transform: uppercase; font-size: 10px; margin-top: 5px; cursor: pointer; transition: 0.2s; }
        .btn-add:active { transform: scale(0.95); }
        h4 { font-size: 10px; font-weight: 900; color: #fbbf24; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
        .tag { font-size: 7px; font-weight: 900; padding: 2px 5px; border-radius: 4px; text-transform: uppercase; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-6">

    <div id="login-screen" class="fixed inset-0 bg-black z-[9999] flex items-center justify-center p-6">
        <div class="bg-zinc-900 p-8 rounded-[2.5rem] border border-white/10 w-full max-w-sm text-center">
            <h2 class="text-3xl font-black text-yellow-500 italic mb-6 uppercase">REIS LOGIN 👑</h2>
            <input type="email" id="login-email" class="input-adm mb-3 h-12 text-center" placeholder="E-mail">
            <input type="password" id="login-pass" class="input-adm mb-6 h-12 text-center" placeholder="Senha">
            <button onclick="fazerLogin()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-xl uppercase">Entrar</button>
        </div>
    </div>

    <div id="painel-conteudo" class="max-w-7xl mx-auto hidden">
        <header class="flex justify-between items-center mb-6 bg-zinc-900 p-5 rounded-3xl border border-white/5">
            <h1 class="text-2xl font-black text-yellow-500 uppercase italic">REIS MASTER 👑</h1>
            <button onclick="firebase.auth().signOut()" class="bg-red-600 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase">Sair</button>
        </header>

        <div class="box mb-6 border-l-4 border-blue-500">
            <h4 id="form-title">➕ Adicionar / Editar Item</h4>
            <input type="hidden" id="edit-id">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                <select id="item-tipo" class="input-adm h-10">
                    <option value="pizza">Salgada</option>
                    <option value="doce">Doce Normal</option>
                    <option value="premium">Sabor Premium</option>
                    <option value="borda">Borda Recheada</option>
                    <option value="bebida">Bebida</option>
                </select>
                <input type="text" id="item-nome" class="input-adm h-10" placeholder="Nome do Item">
                <input type="number" id="item-preco" class="input-adm h-10" placeholder="Valor Adicional (R$)">
                <div class="flex gap-2">
                    <button id="btn-salvar" onclick="salvarItem()" class="w-full bg-green-600 btn-add h-10 mt-0 text-xs">Salvar Item</button>
                    <button id="btn-cancelar" onclick="limparForm()" class="hidden w-1/3 bg-zinc-700 btn-add h-10 mt-0">X</button>
                </div>
            </div>
            <p class="text-[9px] text-zinc-500 mt-2">* Use o valor 0 para Salgadas e Doces Normais (seguem o preço do tamanho P, M, G).</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="box border-l-4 border-yellow-500 h-fit">
                <h4>⚙️ Preços dos Tamanhos</h4>
                <div class="grid grid-cols-3 gap-2 mb-3">
                    <div class="text-center"><span class="text-[9px] font-bold text-zinc-500">P</span><input type="number" id="v-p" class="input-adm"></div>
                    <div class="text-center"><span class="text-[9px] font-bold text-zinc-500">M</span><input type="number" id="v-m" class="input-adm"></div>
                    <div class="text-center"><span class="text-[9px] font-bold text-zinc-500">G</span><input type="number" id="v-g" class="input-adm"></div>
                </div>
                <input type="number" id="v-taxa" class="input-adm mb-3" placeholder="Taxa Entrega">
                <button onclick="salvarConfig()" class="w-full bg-yellow-500 text-black py-3 rounded-xl font-black text-xs uppercase mb-2">Salvar Configurações</button>
                <button id="btn-loja" onclick="toggleLoja()" class="w-full py-3 rounded-xl font-black text-xs uppercase text-white"></button>
            </div>

            <div class="box col-span-2">
                <h4>📋 Itens no Cardápio (Clique em Editar para alterar)</h4>
                <div id="lista-gerenciar" class="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-[500px] overflow-y-auto pr-2"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDP-I5zYn9gVIMgNLFULIQTHypi0CqmlwA",
            authDomain: "pizzaria-reis-173ab.firebaseapp.com",
            projectId: "pizzaria-reis-173ab",
            storageBucket: "pizzaria-reis-173ab.firebasestorage.app",
            messagingSenderId: "1051814435008",
            appId: "1:1051814435008:web:a596d3d67d7360e8fab525"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if (user && user.email === "pizzariareis2026@gmail.com") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('painel-conteudo').classList.remove('hidden');
                admInit();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('painel-conteudo').classList.add('hidden');
            }
        });

        function fazerLogin() {
            auth.signInWithEmailAndPassword(document.getElementById('login-email').value, document.getElementById('login-pass').value)
                .catch(() => alert("Acesso Negado!"));
        }

        function admInit() {
            // Sincroniza Preços e Loja
            db.collection('config').doc('precos').onSnapshot(doc => {
                if(doc.exists){
                    document.getElementById('v-p').value = doc.data().p;
                    document.getElementById('v-m').value = doc.data().m;
                    document.getElementById('v-g').value = doc.data().g;
                }
            });
            db.collection('config').doc('identidade').onSnapshot(doc => {
                if(doc.exists) document.getElementById('v-taxa').value = doc.data().taxa;
            });
            db.collection('config').doc('geral').onSnapshot(doc => {
                const aberto = doc.exists ? doc.data().aberto : false;
                const btn = document.getElementById('btn-loja');
                btn.innerText = aberto ? "LOJA ABERTA ✅" : "LOJA FECHADA ❌";
                btn.className = "w-full py-3 rounded-xl font-black text-xs uppercase " + (aberto ? "bg-green-600" : "bg-red-600");
            });

            // Sincroniza Lista de Itens
            db.collection('cardapio').orderBy('tipo').onSnapshot(snap => {
                const list = document.getElementById('lista-gerenciar');
                list.innerHTML = snap.docs.map(doc => {
                    const i = doc.data();
                    const cores = { pizza: 'bg-red-600', doce: 'bg-pink-600', premium: 'bg-purple-600', borda: 'bg-amber-600', bebida: 'bg-blue-600' };
                    return `
                    <div class="bg-black/40 p-3 rounded-xl border border-zinc-800 flex justify-between items-center">
                        <div class="flex flex-col">
                            <span class="tag w-fit ${cores[i.tipo] || 'bg-zinc-600'} mb-1">${i.tipo}</span>
                            <span class="text-[10px] font-bold uppercase">${i.nome}</span>
                            <span class="text-[9px] text-yellow-500 font-bold">${i.preco > 0 ? 'R$ '+i.preco : 'Preço Base'}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="prepararEdicao('${doc.id}', '${i.tipo}', '${i.nome}', ${i.preco})" class="bg-blue-600 px-3 py-1 rounded text-[8px] font-black uppercase hover:bg-blue-500">Editar</button>
                            <button onclick="db.collection('cardapio').doc('${doc.id}').delete()" class="text-red-500 font-black px-1 hover:scale-110">✕</button>
                        </div>
                    </div>`;
                }).join('');
            });
        }

        // FUNÇÃO PARA SALVAR (CRIAR OU ATUALIZAR)
        async function salvarItem() {
            const id = document.getElementById('edit-id').value;
            const tipo = document.getElementById('item-tipo').value;
            const nome = document.getElementById('item-nome').value;
            const preco = parseFloat(document.getElementById('item-preco').value) || 0;

            if(!nome) return alert("Digite o nome!");

            const dados = { tipo, nome, preco, data: new Date() };

            if(id) {
                await db.collection('cardapio').doc(id).update(dados);
                alert("Item atualizado!");
            } else {
                await db.collection('cardapio').add(dados);
                alert("Item adicionado!");
            }
            limparForm();
        }

        function prepararEdicao(id, tipo, nome, preco) {
            document.getElementById('edit-id').value = id;
            document.getElementById('item-tipo').value = tipo;
            document.getElementById('item-nome').value = nome;
            document.getElementById('item-preco').value = preco;
            
            document.getElementById('form-title').innerText = "📝 Editando: " + nome;
            document.getElementById('btn-salvar').innerText = "Atualizar Agora";
            document.getElementById('btn-salvar').classList.replace('bg-green-600', 'bg-blue-600');
            document.getElementById('btn-cancelar').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function limparForm() {
            document.getElementById('edit-id').value = "";
            document.getElementById('item-nome').value = "";
            document.getElementById('item-preco').value = "";
            document.getElementById('form-title').innerText = "➕ Adicionar / Editar Item";
            document.getElementById('btn-salvar').innerText = "Salvar Item";
            document.getElementById('btn-salvar').classList.replace('bg-blue-600', 'bg-green-600');
            document.getElementById('btn-cancelar').classList.add('hidden');
        }

        async function salvarConfig() {
            await db.collection('config').doc('precos').set({ p: parseFloat(document.getElementById('v-p').value), m: parseFloat(document.getElementById('v-m').value), g: parseFloat(document.getElementById('v-g').value) });
            await db.collection('config').doc('identidade').set({ taxa: parseFloat(document.getElementById('v-taxa').value) });
            alert("Preços salvos!");
        }

        async function toggleLoja() {
            const doc = await db.collection('config').doc('geral').get();
            await db.collection('config').doc('geral').set({ aberto: !doc.data().aberto });
        }
    </script>
</body>
</html>
