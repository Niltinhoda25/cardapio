<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL DO PATRÃO | Reis</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #09090b; color: white; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: #18181b; padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #27272a; border-left: 5px solid #fbbf24; }
        h3 { margin: 0 0 15px; font-size: 13px; color: #fbbf24; text-transform: uppercase; letter-spacing: 1px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #27272a; background: #000; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-salvar { background: #fbbf24; color: black; }
        .btn-status { background: #27272a; color: white; margin-bottom: 5px; }
        .active-open { background: #16a34a !important; }
        .active-close { background: #dc2626 !important; }
        .item-row { background: #27272a; padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-left: 3px solid #fbbf24; }
        .btn-del { width: auto; padding: 5px 10px; background: #ef444422; color: #ef4444; border: 1px solid #ef4444; font-size: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align: center; margin-bottom: 20px;">
            <h1 style="color: #fbbf24; margin: 0; font-size: 20px;">GESTOR REIS 👑</h1>
            <a href="index.html" style="color: #71717a; text-decoration: none; font-size: 12px;">← Voltar ao Site</a>
        </div>

        <div class="card">
            <h3>🖼️ Identidade e Entrega</h3>
            <input type="text" id="logo-url" placeholder="Link da imagem da Logo">
            <small>TAXA DE ENTREGA (R$)</small>
            <input type="number" id="taxa-entrega" step="0.01">
            <button onclick="salvarGeral()" class="btn-salvar">Atualizar Configs</button>
        </div>

        <div class="card">
            <h3>🛑 Status da Loja</h3>
            <button onclick="setStatus(true)" id="btn-aberto" class="btn-status">ABRIR</button>
            <button onclick="setStatus(false)" id="btn-fechado" class="btn-status">FECHAR</button>
        </div>

        <div class="card">
            <h3>💰 Preços Pizzas</h3>
            P: <input type="number" id="p-p" step="0.1">
            M: <input type="number" id="p-m" step="0.1">
            G: <input type="number" id="p-g" step="0.1">
            <button onclick="salvarPrecos()" class="btn-salvar">Salvar Preços</button>
        </div>

        <div class="card">
            <h3>🍕 Adicionar Item</h3>
            <input type="text" id="n-nome" placeholder="Nome">
            <textarea id="n-desc" placeholder="Ingredientes/Descrição"></textarea>
            <input type="number" id="n-preco" placeholder="Preço Adicional (Bebida/Borda)" step="0.1">
            <select id="n-tipo">
                <option value="pizza">Sabor Pizza</option>
                <option value="bebida">Bebida</option>
                <option value="borda">Borda</option>
            </select>
            <button onclick="addItem()" style="background:white; color:black;">Cadastrar</button>
        </div>

        <div class="card">
            <h3>📜 Itens Cadastrados</h3>
            <div id="lista-cardapio"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDP-I5zYn9gVIMgNLFULIQTHypi0CqmlwA",
            authDomain: "pizzaria-reis-173ab.firebaseapp.com",
            projectId: "pizzaria-reis-173ab",
            storageBucket: "pizzaria-reis-173ab.firebasestorage.app",
            messagingSenderId: "1051814435008",
            appId: "1:1051814435008:web:a596d3d67d7360e8fab525"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function salvarGeral() {
            const logo = document.getElementById('logo-url').value;
            const taxa = parseFloat(document.getElementById('taxa-entrega').value) || 0;
            await db.collection('config').doc('identidade').set({ logo, taxa });
            alert("Salvo!");
        }

        async function setStatus(s) {
            await db.collection('config').doc('geral').set({ aberto: s });
            updateStatusUI(s);
        }

        function updateStatusUI(s) {
            document.getElementById('btn-aberto').classList.toggle('active-open', s);
            document.getElementById('btn-fechado').classList.toggle('active-close', !s);
        }

        async function salvarPrecos() {
            const p = parseFloat(document.getElementById('p-p').value) || 0;
            const m = parseFloat(document.getElementById('p-m').value) || 0;
            const g = parseFloat(document.getElementById('p-g').value) || 0;
            await db.collection('config').doc('precos').set({ p, m, g });
            alert("Preços salvos!");
        }

        async function addItem() {
            const nome = document.getElementById('n-nome').value;
            const desc = document.getElementById('n-desc').value;
            const preco = parseFloat(document.getElementById('n-preco').value) || 0;
            const tipo = document.getElementById('n-tipo').value;
            if(!nome) return;
            await db.collection('cardapio').add({ nome, desc, preco, tipo, data: new Date() });
            alert("Item adicionado!");
        }

        db.collection('cardapio').orderBy('data', 'desc').onSnapshot(snap => {
            const lista = document.getElementById('lista-cardapio');
            lista.innerHTML = "";
            snap.forEach(doc => {
                const item = doc.data();
                lista.innerHTML += `<div class="item-row">
                    <span><b>${item.nome}</b> (${item.tipo})</span>
                    <button onclick="apagar('${doc.id}')" class="btn-del">X</button>
                </div>`;
            });
        });

        async function apagar(id) { if(confirm("Apagar?")) await db.collection('cardapio').doc(id).delete(); }

        // Carregar
        db.collection('config').doc('identidade').get().then(doc => {
            if(doc.exists) {
                document.getElementById('logo-url').value = doc.data().logo || "";
                document.getElementById('taxa-entrega').value = doc.data().taxa || 7.00;
            }
        });
        db.collection('config').doc('precos').get().then(doc => {
            if(doc.exists) {
                document.getElementById('p-p').value = doc.data().p;
                document.getElementById('p-m').value = doc.data().m;
                document.getElementById('p-g').value = doc.data().g;
            }
        });
        db.collection('config').doc('geral').get().then(doc => { if(doc.exists) updateStatusUI(doc.data().aberto); });
    </script>
</body>
</html>
