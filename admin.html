<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REIS MASTER | Controle</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; }
        .box { background: #111113; border: 1px solid #27272a; border-radius: 20px; padding: 15px; }
        .input-adm { background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; width: 100%; font-size: 11px; }
        .btn-add { color: #fff; font-weight: 900; padding: 8px; border-radius: 8px; width: 100%; text-transform: uppercase; font-size: 10px; margin-top: 8px; transition: 0.3s; cursor: pointer; }
        h4 { font-size: 10px; font-weight: 900; color: #fbbf24; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }
    </style>
</head>
<body class="p-4 md:p-6">

    <div id="login-screen" class="fixed inset-0 bg-black z-[9999] flex items-center justify-center p-6">
        <div class="bg-zinc-900 p-8 rounded-[2.5rem] border border-white/10 w-full max-w-sm text-center shadow-2xl">
            <h2 class="text-3xl font-black text-yellow-500 italic mb-2 uppercase">REIS LOGIN 👑</h2>
            <p class="text-[10px] text-zinc-500 font-bold mb-8 uppercase tracking-widest">Painel Administrativo</p>
            
            <input type="email" id="login-email" class="input-adm mb-3 h-12" placeholder="pizzariareis2026@gmail.com">
            <input type="password" id="login-pass" class="input-adm mb-6 h-12" placeholder="Sua Senha">
            
            <button onclick="fazerLogin()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-xl uppercase hover:bg-yellow-400 transition-all">ENTRAR NO PAINEL</button>
            <p id="login-erro" class="text-red-500 text-[10px] font-bold mt-4 hidden uppercase"></p>
        </div>
    </div>

    <div id="painel-conteudo" class="max-w-7xl mx-auto hidden">
        <header class="flex justify-between items-center mb-6 bg-zinc-900 p-5 rounded-3xl border border-white/5">
            <div>
                <h1 class="text-2xl font-black text-yellow-500 uppercase italic leading-none">REIS MASTER 👑</h1>
                <span class="text-[9px] text-zinc-500 font-bold uppercase tracking-tighter">Logado como: pizzariareis2026</span>
            </div>
            <button onclick="firebase.auth().signOut()" class="bg-red-600 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase">Sair</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-3 mb-6">
            <div class="box">
                <h4>🍕 Salgada</h4>
                <input type="text" id="s-nome" class="input-adm mb-2" placeholder="Nome">
                <input type="text" id="s-desc" class="input-adm" placeholder="Ingredientes">
                <button onclick="addProduto('pizza', 's')" class="btn-add bg-red-600">Adicionar</button>
            </div>
            <div class="box">
                <h4>🍫 Doce</h4>
                <input type="text" id="d-nome" class="input-adm mb-2" placeholder="Nome">
                <input type="text" id="d-desc" class="input-adm" placeholder="Ingredientes">
                <button onclick="addProduto('doce', 'd')" class="btn-add bg-pink-600">Adicionar</button>
            </div>
            <div class="box">
                <h4>💎 Premium</h4>
                <input type="text" id="pr-nome" class="input-adm mb-2" placeholder="Nome">
                <input type="number" id="pr-preco" class="input-adm" placeholder="Adicional R$">
                <button onclick="addProduto('premium', 'pr')" class="btn-add bg-purple-600">Adicionar</button>
            </div>
            <div class="box">
                <h4>🧀 Borda</h4>
                <input type="text" id="b-nome" class="input-adm mb-2" placeholder="Sabor">
                <input type="number" id="b-preco" class="input-adm" placeholder="Preço R$">
                <button onclick="addProduto('borda', 'b')" class="btn-add bg-yellow-600 text-black">Adicionar</button>
            </div>
            <div class="box">
                <h4>🥤 Bebida</h4>
                <input type="text" id="be-nome" class="input-adm mb-2" placeholder="Ex: Coca 2L">
                <input type="number" id="be-preco" class="input-adm" placeholder="Preço R$">
                <button onclick="addProduto('bebida', 'be')" class="btn-add bg-blue-600">Adicionar</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="box border-l-4 border-yellow-500 h-fit">
                <h4>⚙️ Configurações</h4>
                <div class="grid grid-cols-3 gap-2 mb-2">
                    <input type="number" id="v-p" class="input-adm" placeholder="P">
                    <input type="number" id="v-m" class="input-adm" placeholder="M">
                    <input type="number" id="v-g" class="input-adm" placeholder="G">
                </div>
                <input type="number" id="v-taxa" class="input-adm mb-3" placeholder="Taxa Entrega">
                <button onclick="salvarPrecos()" class="w-full bg-yellow-500 text-black py-3 rounded-xl font-black text-xs uppercase mb-2">Salvar Preços</button>
                <button id="btn-loja" onclick="toggleLoja()" class="w-full py-3 rounded-xl font-black text-xs uppercase text-white"></button>
            </div>
            
            <div class="box col-span-2 overflow-y-auto max-h-[500px]">
                <h4>📋 Cardápio Atual</h4>
                <div id="lista-gerenciar" class="grid grid-cols-1 md:grid-cols-2 gap-2"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDP-I5zYn9gVIMgNLFULIQTHypi0CqmlwA",
            authDomain: "pizzaria-reis-173ab.firebaseapp.com",
            projectId: "pizzaria-reis-173ab",
            storageBucket: "pizzaria-reis-173ab.firebasestorage.app",
            messagingSenderId: "1051814435008",
            appId: "1:1051814435008:web:a596d3d67d7360e8fab525"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // MONITOR DE LOGIN
        auth.onAuthStateChanged(user => {
            if (user && user.email === "pizzariareis2026@gmail.com") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('painel-conteudo').classList.remove('hidden');
                admInit();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('painel-conteudo').classList.add('hidden');
            }
        });

        function fazerLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            const erroP = document.getElementById('login-erro');

            auth.signInWithEmailAndPassword(email, pass).catch(err => {
                erroP.classList.remove('hidden');
                erroP.innerText = "ACESSO NEGADO: " + err.message;
            });
        }

        function admInit() {
            // Preços
            db.collection('config').doc('precos').onSnapshot(doc => {
                if(doc.exists){
                    document.getElementById('v-p').value = doc.data().p;
                    document.getElementById('v-m').value = doc.data().m;
                    document.getElementById('v-g').value = doc.data().g;
                }
            });
            // Taxa
            db.collection('config').doc('identidade').onSnapshot(doc => {
                if(doc.exists) document.getElementById('v-taxa').value = doc.data().taxa;
            });
            // Loja
            db.collection('config').doc('geral').onSnapshot(doc => {
                const aberto = doc.exists ? doc.data().aberto : false;
                const btn = document.getElementById('btn-loja');
                btn.innerText = aberto ? "LOJA ABERTA ✅" : "LOJA FECHADA ❌";
                btn.className = aberto ? "w-full bg-green-600 py-3 rounded-xl font-black text-xs uppercase" : "w-full bg-red-600 py-3 rounded-xl font-black text-xs uppercase";
            });
            // Lista Itens
            db.collection('cardapio').orderBy('data','desc').onSnapshot(snap => {
                const list = document.getElementById('lista-gerenciar');
                list.innerHTML = snap.docs.map(doc => {
                    const i = doc.data();
                    return `
                    <div class="bg-black/40 p-3 rounded-xl border border-zinc-800 flex justify-between items-center">
                        <span class="text-[10px] font-bold uppercase">${i.nome}</span>
                        <button onclick="db.collection('cardapio').doc('${doc.id}').delete()" class="text-red-600 font-black px-2 hover:scale-125 transition-all">✕</button>
                    </div>`;
                }).join('');
            });
        }

        async function addProduto(tipo, pref) {
            const nome = document.getElementById(`${pref}-nome`).value;
            const desc = document.getElementById(`${pref}-desc`) ? document.getElementById(`${pref}-desc`).value : '';
            const preco = document.getElementById(`${pref}-preco`) ? parseFloat(document.getElementById(`${pref}-preco`).value) : 0;
            if(!nome) return alert("Preencha o nome!");
            await db.collection('cardapio').add({ nome, tipo, desc, preco, data: new Date(), disponivel: true });
            document.getElementById(`${pref}-nome`).value = '';
        }

        async function salvarPrecos() {
            await db.collection('config').doc('precos').set({ 
                p: parseFloat(document.getElementById('v-p').value), 
                m: parseFloat(document.getElementById('v-m').value), 
                g: parseFloat(document.getElementById('v-g').value) 
            });
            await db.collection('config').doc('identidade').set({ taxa: parseFloat(document.getElementById('v-taxa').value) });
            alert("Salvo com sucesso!");
        }

        async function toggleLoja() {
            const doc = await db.collection('config').doc('geral').get();
            await db.collection('config').doc('geral').set({ aberto: !doc.data().aberto });
        }
    </script>
</body>
</html>
