<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administração | Reis Profissional</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #fbbf24; --red: #dc2626; --dark: #09090b; --card: #18181b; --zinc: #27272a; }
        body { font-family: 'Montserrat', sans-serif; background: var(--dark); color: white; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        #login-adm { max-width: 400px; margin: 100px auto; background: var(--card); padding: 40px; border-radius: 30px; border: 1px solid var(--zinc); text-align: center; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid var(--zinc); padding-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--zinc); position: relative; overflow: hidden; }
        .card::before { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--gold); }
        h2 { color: var(--gold); font-weight: 900; margin: 0 0 20px; font-size: 18px; text-transform: uppercase; }
        label { display: block; font-size: 11px; color: #a1a1aa; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 1px solid var(--zinc); background: #000; color: #fff; font-family: inherit; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-outline { background: transparent; border: 1px solid var(--zinc); color: #71717a; }
        .item-row { background: #000; padding: 15px; border-radius: 15px; border: 1px solid var(--zinc); display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .item-info b { color: var(--gold); text-transform: uppercase; font-size: 14px; }
        .item-info p { margin: 0; font-size: 11px; color: #71717a; }
        .btn-del { width: auto; padding: 8px 15px; font-size: 10px; background: #450a0a; color: #f87171; border: 1px solid #991b1b; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="login-adm">
        <h1 style="color: white; font-weight: 900;">ADMINISTRAÇÃO 🔐</h1>
        <input type="email" id="adm-email" placeholder="E-mail">
        <input type="password" id="adm-pass" placeholder="Senha">
        <button onclick="fazerLogin()" class="btn-gold">Entrar no Sistema</button>
    </div>

    <div id="painel-adm" class="container hidden">
        <div class="header">
            <h1 style="font-weight: 900; margin:0;">PAINEL DE ADMINISTRAÇÃO 👑</h1>
            <button onclick="firebase.auth().signOut()" class="btn-outline" style="width: auto; padding: 10px 20px;">Sair</button>
        </div>

        <div class="grid">
            <div class="card">
                <h2>⚙️ Geral & Entrega</h2>
                <label>Logo URL</label>
                <input type="text" id="logo-url">
                <label>Taxa de Entrega Fixa (R$)</label>
                <input type="number" id="taxa-entrega" step="0.01">
                <button onclick="salvarConfig()" class="btn-gold">Salvar Configs</button>
            </div>

            <div class="card">
                <h2>💰 Preços Pizzas</h2>
                <label>Pequena (R$)</label> <input type="number" id="p-p" step="0.01">
                <label>Média (R$)</label> <input type="number" id="p-m" step="0.01">
                <label>Grande (R$)</label> <input type="number" id="p-g" step="0.01">
                <button onclick="salvarPrecos()" class="btn-gold">Atualizar Preços</button>
            </div>

            <div class="card">
                <h2>🍕 Novo Item</h2>
                <label>Nome</label>
                <input type="text" id="n-nome" placeholder="Ex: Chocolate com Morango">
                <label>Descrição / Ingredientes</label>
                <textarea id="n-desc" rows="2"></textarea>
                <label>Preço Adicional</label>
                <input type="number" id="n-preco" step="0.01" value="0">
                <label>Categoria</label>
                <select id="n-tipo">
                    <option value="pizza">Sabor de Pizza</option>
                    <option value="borda">Borda Recheada</option>
                    <option value="bebida">Bebida</option>
                </select>
                <button onclick="addItem()" style="background: white; color: black;">Cadastrar</button>
            </div>

            <div class="card">
                <h2>📜 Itens Ativos</h2>
                <div id="itens-container"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDP-I5zYn9gVIMgNLFULIQTHypi0CqmlwA",
            authDomain: "pizzaria-reis-173ab.firebaseapp.com",
            projectId: "pizzaria-reis-173ab",
            storageBucket: "pizzaria-reis-173ab.firebasestorage.app",
            messagingSenderId: "1051814435008",
            appId: "1:1051814435008:web:a596d3d67d7360e8fab525"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        async function fazerLogin() {
            const e = document.getElementById('adm-email').value;
            const s = document.getElementById('adm-pass').value;
            try { await auth.signInWithEmailAndPassword(e, s); } catch (err) { alert("Acesso negado!"); }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('login-adm').classList.add('hidden');
                document.getElementById('painel-adm').classList.remove('hidden');
                carregar();
            } else {
                document.getElementById('login-adm').classList.remove('hidden');
                document.getElementById('painel-adm').classList.add('hidden');
            }
        });

        function carregar() {
            db.collection('config').doc('identidade').onSnapshot(doc => { 
                if(doc.exists){ 
                    document.getElementById('logo-url').value = doc.data().logo; 
                    document.getElementById('taxa-entrega').value = doc.data().taxa; 
                } 
            });
            db.collection('config').doc('precos').onSnapshot(doc => { 
                if(doc.exists){ 
                    document.getElementById('p-p').value = doc.data().p; 
                    document.getElementById('p-m').value = doc.data().m; 
                    document.getElementById('p-g').value = doc.data().g; 
                } 
            });
            db.collection('cardapio').orderBy('data','desc').onSnapshot(snap => {
                const c = document.getElementById('itens-container'); c.innerHTML = "";
                snap.forEach(doc => {
                    const i = doc.data();
                    c.innerHTML += `
                        <div class="item-row">
                            <div class="item-info">
                                <b>${i.nome}</b>
                                <p>${i.desc || 'Sem descrição'}</p>
                            </div>
                            <button onclick="db.collection('cardapio').doc('${doc.id}').delete()" class="btn-del">APAGAR</button>
                        </div>`;
                });
            });
        }

        async function salvarConfig() { 
            await db.collection('config').doc('identidade').set({ 
                logo: document.getElementById('logo-url').value, 
                taxa: parseFloat(document.getElementById('taxa-entrega').value) || 0 
            }); 
            alert("Configurações de Administração Salvas!"); 
        }

        async function salvarPrecos() { 
            await db.collection('config').doc('precos').set({ 
                p: parseFloat(document.getElementById('p-p').value) || 0, 
                m: parseFloat(document.getElementById('p-m').value) || 0, 
                g: parseFloat(document.getElementById('p-g').value) || 0 
            }); 
            alert("Preços atualizados!"); 
        }

        async function addItem() { 
            const nome = document.getElementById('n-nome').value;
            const desc = document.getElementById('n-desc').value;
            const preco = parseFloat(document.getElementById('n-preco').value) || 0;
            const tipo = document.getElementById('n-tipo').value;
            if(!nome) return alert("Digite o nome!");
            await db.collection('cardapio').add({ nome, desc, preco, tipo, data: new Date() }); 
            document.getElementById('n-nome').value = "";
            document.getElementById('n-desc').value = "";
            alert("Item Adicionado!"); 
        }
    </script>
</body>
</html>
