<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM Reis | Gerenciamento Geral</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #09090b; color: #fff; }
        .card { background: #18181b; border: 1px solid #27272a; padding: 20px; border-radius: 20px; }
        input, select, textarea { background: #000 !important; border: 1px solid #333 !important; color: white !important; padding: 10px; border-radius: 10px; font-size: 12px; width: 100%; }
        
        @media print {
            body * { display: none !important; }
            #area-impressao, #area-impressao * { display: block !important; visibility: visible !important; color: #000 !important; }
            #area-impressao { position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 10px; background: white !important; }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    
    <div id="area-impressao" class="hidden"></div>

    <div id="login-adm" class="max-w-md mx-auto mt-20 p-8 bg-zinc-900 border border-zinc-800 rounded-3xl text-center shadow-2xl">
        <h1 class="text-3xl font-black mb-6 italic text-yellow-500 uppercase">REIS ADMIN 👑</h1>
        <div class="space-y-4">
            <input type="email" id="adm-email" placeholder="E-mail Administrativo">
            <input type="password" id="adm-pass" placeholder="Senha de Acesso">
            <button onclick="fazerLogin()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-xl uppercase hover:scale-95 transition-all">Entrar no Sistema</button>
        </div>
    </div>

    <div id="painel-adm" class="hidden max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 border-b border-zinc-800 pb-5 gap-4">
            <div>
                <h1 class="text-2xl font-black italic uppercase text-yellow-500">REIS PIZZARIA 👑</h1>
                <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Painel de Gestão e Comandas</p>
            </div>
            <div class="flex gap-2">
                <button id="btn-status-loja" onclick="toggleLoja()" class="px-6 py-3 rounded-xl font-black text-[10px] uppercase"></button>
                <button onclick="firebase.auth().signOut()" class="bg-red-600 px-6 py-3 rounded-xl font-black text-[10px] uppercase">Sair</button>
            </div>
        </div>

        <h2 class="text-blue-500 font-black uppercase text-xs mb-4 italic flex items-center gap-2">
            <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span> Pedidos Recentes (Prontos p/ Imprimir)
        </h2>
        <div id="pedidos-container" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-10"></div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="card space-y-4 border-l-4 border-red-600">
                <h3 class="text-red-600 font-black text-xs uppercase italic">🍕 Cadastrar Pizza Salgada</h3>
                <input type="text" id="s-nome" placeholder="Ex: Frango C/ Catupiry">
                <textarea id="s-desc" class="h-24" placeholder="Ingredientes detalhados..."></textarea>
                <button onclick="addPizzaSalgada()" class="w-full bg-red-600 text-white font-black py-4 rounded-xl text-xs uppercase italic">Salvar Salgada</button>
            </div>

            <div class="card space-y-3 border-l-4 border-pink-500">
                <h3 class="text-pink-500 font-black text-xs uppercase italic">🍫 Cadastrar Pizza Doce</h3>
                <input type="text" id="d-nome" placeholder="Ex: Sensação">
                <textarea id="d-desc" class="h-16" placeholder="Descrição da Doce"></textarea>
                <div>
                    <label class="text-[9px] font-black text-zinc-500 uppercase mb-1 block">Chocolate Principal:</label>
                    <select id="d-choco">
                        <option value="Preto">Chocolate Preto</option>
                        <option value="Branco">Chocolate Branco</option>
                        <option value="Misto">Misto (Preto & Branco)</option>
                    </select>
                </div>
                <button onclick="addPizzaDoce()" class="w-full bg-pink-600 text-white font-black py-4 rounded-xl text-xs uppercase italic">Salvar Doce</button>
            </div>

            <div class="space-y-6">
                <div class="card space-y-3 border-l-4 border-yellow-500">
                    <h3 class="text-yellow-500 font-black text-xs uppercase italic">💰 Configurações e Preços</h3>
                    <input type="number" id="taxa-entrega" placeholder="Valor da Entrega (R$)">
                    <div class="grid grid-cols-3 gap-2">
                        <div><label class="text-[8px] uppercase font-bold text-zinc-500">Pequena</label><input type="number" id="p-p"></div>
                        <div><label class="text-[8px] uppercase font-bold text-zinc-500">Média</label><input type="number" id="p-m"></div>
                        <div><label class="text-[8px] uppercase font-bold text-zinc-500">Grande</label><input type="number" id="p-g"></div>
                    </div>
                    <button onclick="salvarPrecosGeral()" class="w-full bg-yellow-500 text-black font-black py-2 rounded-lg text-[10px] uppercase">Salvar Sistema</button>
                </div>
                
                <div class="card space-y-3 border-l-4 border-blue-500">
                    <h3 class="text-blue-500 font-black text-xs uppercase italic">🥤 Bebidas e Bordas</h3>
                    <input type="text" id="o-nome" placeholder="Nome (Coca, Borda Catupiry...)">
                    <input type="number" id="o-preco" placeholder="Preço Extra (R$)">
                    <select id="o-tipo">
                        <option value="bebida">Bebida</option>
                        <option value="borda">Borda Recheada</option>
                    </select>
                    <button onclick="addOutroItem()" class="w-full bg-blue-600 text-white font-black py-2 rounded-lg text-[10px] uppercase">Salvar Item</button>
                </div>
            </div>
        </div>

        <h2 class="mt-12 mb-6 font-black uppercase text-xl border-l-4 border-yellow-500 pl-3 italic">Controle de Itens do Cardápio</h2>
        <div id="itens-container" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 gap-3 pb-20"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDP-I5zYn9gVIMgNLFULIQTHypi0CqmlwA",
            authDomain: "pizzaria-reis-173ab.firebaseapp.com",
            projectId: "pizzaria-reis-173ab",
            storageBucket: "pizzaria-reis-173ab.firebasestorage.app",
            messagingSenderId: "1051814435008",
            appId: "1:1051814435008:web:a596d3d67d7360e8fab525"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        async function fazerLogin() {
            const e = document.getElementById('adm-email').value;
            const s = document.getElementById('adm-pass').value;
            try { await auth.signInWithEmailAndPassword(e, s); } catch (err) { alert("Senha ou E-mail incorretos!"); }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('login-adm').classList.add('hidden');
                document.getElementById('painel-adm').classList.remove('hidden');
                carregarADM();
            } else {
                document.getElementById('login-adm').classList.remove('hidden');
                document.getElementById('painel-adm').classList.add('hidden');
            }
        });

        function carregarADM() {
            // Monitorar Pedidos para Impressão
            db.collection('pedidos').orderBy('data', 'desc').limit(16).onSnapshot(snap => {
                const c = document.getElementById('pedidos-container'); c.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    c.innerHTML += `
                        <div class="card border-l-4 border-blue-600 p-3 flex flex-col justify-between">
                            <div>
                                <h4 class="font-black text-[10px] uppercase truncate">${p.cliente}</h4>
                                <p class="text-[8px] text-zinc-500 mb-2">${p.tamanho} - R$ ${p.total.toFixed(2)}</p>
                            </div>
                            <div class="flex gap-1">
                                <button onclick='imprimir("${doc.id}", ${JSON.stringify(p)})' class="bg-blue-600 text-[8px] font-black p-2 rounded flex-1">IMPRIMIR</button>
                                <button onclick="deletarPedido('${doc.id}')" class="bg-zinc-800 text-[8px] p-2 rounded px-3 font-black text-red-500">X</button>
                            </div>
                        </div>`;
                });
            });

            // Status Aberto/Fechado
            db.collection('config').doc('geral').onSnapshot(doc => {
                const aberto = doc.exists ? doc.data().aberto : false;
                const btn = document.getElementById('btn-status-loja');
                btn.innerText = aberto ? "LOJA ABERTA 🟢" : "LOJA FECHADA 🔴";
                btn.className = aberto ? "bg-green-600 px-6 py-3 rounded-xl font-black text-[10px]" : "bg-red-600 px-6 py-3 rounded-xl font-black text-[10px]";
            });

            // Carregar Preços e Taxas
            db.collection('config').doc('identidade').onSnapshot(doc => { if(doc.exists) document.getElementById('taxa-entrega').value = doc.data().taxa; });
            db.collection('config').doc('precos').onSnapshot(doc => {
                if(doc.exists) {
                    document.getElementById('p-p').value = doc.data().p;
                    document.getElementById('p-m').value = doc.data().m;
                    document.getElementById('p-g').value = doc.data().g;
                }
            });

            // Listar Itens do Cardápio
            db.collection('cardapio').orderBy('data','desc').onSnapshot(snap => {
                const c = document.getElementById('itens-container'); c.innerHTML = "";
                snap.forEach(doc => {
                    const i = doc.data();
                    const disp = i.disponivel !== false;
                    c.innerHTML += `
                        <div class="card ${!disp ? 'opacity-30 border-red-900' : ''} p-2 text-center flex flex-col justify-between">
                            <b class="text-[8px] uppercase block truncate">${i.nome}</b>
                            <p class="text-[7px] text-zinc-600 uppercase mb-2">${i.tipo}</p>
                            <div class="flex flex-col gap-1">
                                <button onclick="toggleDisp('${doc.id}', ${disp})" class="text-[7px] bg-zinc-800 p-1.5 rounded font-black">${disp ? 'PAUSAR' : 'ATIVAR'}</button>
                                <button onclick="deletarItem('${doc.id}')" class="text-[7px] text-red-700 font-bold p-1">REMOVER</button>
                            </div>
                        </div>`;
                });
            });
        }

        // CADASTROS
        async function addPizzaSalgada() {
            const nome = document.getElementById('s-nome').value.trim();
            const desc = document.getElementById('s-desc').value.trim();
            if(!nome) return alert("Nome é obrigatório.");
            await db.collection('cardapio').add({ nome, desc, tipo: 'pizza', chocolate: 'Nenhum', preco: 0, disponivel: true, data: new Date() });
            document.getElementById('s-nome').value = ""; document.getElementById('s-desc').value = "";
            alert("✅ Pizza Salgada salva!");
        }

        async function addPizzaDoce() {
            const nome = document.getElementById('d-nome').value.trim();
            const desc = document.getElementById('d-desc').value.trim();
            const choco = document.getElementById('d-choco').value;
            if(!nome) return alert("Nome é obrigatório.");
            await db.collection('cardapio').add({ nome, desc, tipo: 'doce', chocolate: choco, preco: 0, disponivel: true, data: new Date() });
            document.getElementById('d-nome').value = ""; document.getElementById('d-desc').value = "";
            alert("✅ Pizza Doce salva!");
        }

        async function addOutroItem() {
            const nome = document.getElementById('o-nome').value.trim();
            const preco = parseFloat(document.getElementById('o-preco').value) || 0;
            const tipo = document.getElementById('o-tipo').value;
            if(!nome) return alert("Nome é obrigatório.");
            await db.collection('cardapio').add({ nome, tipo, preco, disponivel: true, data: new Date() });
            document.getElementById('o-nome').value = ""; document.getElementById('o-preco').value = "";
            alert("✅ Item salvo!");
        }

        // FUNÇÃO DE IMPRESSÃO (CORREÇÃO DE TEXTO BRANCO)
        function imprimir(id, p) {
            const area = document.getElementById('area-impressao');
            const dataPed = p.data && p.data.seconds ? new Date(p.data.seconds * 1000).toLocaleString() : new Date().toLocaleString();
            
            area.innerHTML = `
                <div style="width: 80mm; font-family: 'Courier New', monospace; color: #000; padding: 5px; background: #fff;">
                    <div style="text-align:center; border-bottom:2px solid #000; padding-bottom:10px; margin-bottom:10px;">
                        <h2 style="margin:0; font-size: 20px;">REIS PIZZARIA 👑</h2>
                        <p style="margin:0; font-size: 11px;">Data: ${dataPed}</p>
                    </div>
                    
                    <div style="font-size: 15px; border-bottom: 1px dashed #000; padding-bottom: 10px;">
                        <p style="margin:5px 0;"><b>CLIENTE:</b> ${p.cliente}</p>
                        <p style="margin:5px 0;"><b>ENDEREÇO:</b> ${p.endereco}</p>
                        <p style="margin:5px 0;"><b>REFERÊNCIA:</b> ${p.referencia}</p>
                        <p style="margin:5px 0;"><b>MODO:</b> ${p.tipo}</p>
                    </div>

                    <div style="font-size: 15px; padding: 10px 0; border-bottom: 1px dashed #000;">
                        <p style="margin:5px 0;"><b>TAMANHO:</b> ${p.tamanho}</p>
                        <p style="margin:5px 0;"><b>SABORES:</b><br> ${p.sabores}</p>
                        <p style="margin:5px 0;"><b>BORDA:</b> ${p.borda}</p>
                        <p style="margin:5px 0;"><b>BEBIDAS:</b> ${p.bebidas}</p>
                    </div>

                    <div style="padding-top: 10px; text-align: right; font-size: 15px;">
                        <p style="margin:5px 0;">PAGAMENTO: <b>${p.pagamento}</b></p>
                        ${p.pagamento === 'Dinheiro' ? `<p style="margin:5px 0;">TROCO PARA: R$ ${p.trocoPara}</p>` : ''}
                        <h2 style="margin:10px 0 0 0; font-size: 22px;">TOTAL: R$ ${p.total.toFixed(2)}</h2>
                    </div>
                    
                    <div style="text-align:center; margin-top:20px; font-size:11px; border-top: 1px solid #000; padding-top:10px;">
                        <p>Obrigado pela preferência! 👑</p>
                    </div>
                </div>
            `;
            
            area.classList.remove('hidden');
            setTimeout(() => {
                window.print();
                area.classList.add('hidden');
            }, 500);
        }

        // OUTRAS FUNÇÕES ADM
        async function toggleLoja() {
            const doc = await db.collection('config').doc('geral').get();
            const status = doc.exists ? !doc.data().aberto : true;
            await db.collection('config').doc('geral').set({ aberto: status }, {merge:true});
        }

        async function salvarPrecosGeral() {
            await db.collection('config').doc('identidade').set({ taxa: parseFloat(document.getElementById('taxa-entrega').value) || 0 }, {merge:true});
            await db.collection('config').doc('precos').set({
                p: parseFloat(document.getElementById('p-p').value) || 0,
                m: parseFloat(document.getElementById('p-m').value) || 0,
                g: parseFloat(document.getElementById('p-g').value) || 0
            });
            alert("✅ Configurações de preços atualizadas!");
        }

        async function toggleDisp(id, atual) { await db.collection('cardapio').doc(id).update({ disponivel: !atual }); }
        async function deletarItem(id) { if(confirm("Deseja mesmo remover do cardápio?")) await db.collection('cardapio').doc(id).delete(); }
        async function deletarPedido(id) { if(confirm("Remover comanda da lista?")) await db.collection('pedidos').doc(id).delete(); }
    </script>
</body>
</html>
