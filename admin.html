<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM MASTER | Reis Pizzaria</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #fff; font-family: 'Montserrat', sans-serif; }
        .box { background: #111113; border: 1px solid #27272a; border-radius: 20px; padding: 20px; height: 100%; }
        .input-adm { background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 10px; width: 100%; font-size: 12px; }
        .btn-add { background: #ef4444; color: #fff; font-weight: 900; padding: 10px; border-radius: 10px; width: 100%; text-transform: uppercase; font-size: 10px; margin-top: 10px; }
        h4 { font-size: 11px; font-weight: 900; color: #fbbf24; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #27272a; padding-bottom: 5px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 bg-zinc-900 p-6 rounded-3xl border border-white/5 gap-4">
            <div>
                <h1 class="text-3xl font-black text-yellow-500 uppercase italic">REIS MASTER 👑</h1>
                <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">Painel de Controle Real-Time</p>
            </div>
            <div class="flex gap-6">
                <div class="text-center"><p class="text-[8px] text-zinc-500 uppercase">Visitas</p><h2 id="ana-visitas" class="text-2xl font-black text-blue-500">0</h2></div>
                <div class="text-center"><p class="text-[8px] text-zinc-500 uppercase">Vendas (Cliques)</p><h2 id="ana-cliques" class="text-2xl font-black text-green-500">0</h2></div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="box">
                <h4>🍕 Pizza Salgada</h4>
                <input type="text" id="s-nome" class="input-adm mb-2" placeholder="Nome">
                <input type="text" id="s-desc" class="input-adm" placeholder="Ingredientes">
                <button onclick="addProduto('pizza', 's')" class="btn-add">Cadastrar Salgada</button>
            </div>
            <div class="box">
                <h4>🍫 Pizza Doce</h4>
                <input type="text" id="d-nome" class="input-adm mb-2" placeholder="Nome">
                <input type="text" id="d-desc" class="input-adm" placeholder="Ex: Chocolate e Morango">
                <button onclick="addProduto('doce', 'd')" class="btn-add bg-pink-600">Cadastrar Doce</button>
            </div>
            <div class="box">
                <h4>🧀 Bordas</h4>
                <input type="text" id="b-nome" class="input-adm mb-2" placeholder="Sabor da Borda">
                <input type="number" id="b-preco" class="input-adm" placeholder="Preço Adicional R$">
                <button onclick="addProduto('borda', 'b')" class="btn-add bg-yellow-600 text-black">Cadastrar Borda</button>
            </div>
            <div class="box">
                <h4>🥤 Bebidas</h4>
                <input type="text" id="be-nome" class="input-adm mb-2" placeholder="Ex: Coca 2L">
                <input type="number" id="be-preco" class="input-adm" placeholder="Preço R$">
                <button onclick="addProduto('bebida', 'be')" class="btn-add bg-blue-600">Cadastrar Bebida</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="box border-l-4 border-red-600">
                <h4>📢 Promoção (Banner Topo)</h4>
                <input type="text" id="p-txt" class="input-adm mb-2" placeholder="Texto do Banner">
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <input type="time" id="p-in" class="input-adm">
                    <input type="time" id="p-out" class="input-adm">
                </div>
                <input type="color" id="p-cor" class="w-full h-10 rounded cursor-pointer bg-transparent border border-zinc-800 mb-2">
                <div class="flex gap-2">
                    <button onclick="setPromo(true)" class="flex-1 bg-green-600 py-3 rounded-xl font-black text-[10px] uppercase">Ativar</button>
                    <button onclick="setPromo(false)" class="flex-1 bg-zinc-800 py-3 rounded-xl font-black text-[10px] uppercase text-red-500">Pausar</button>
                </div>
            </div>

            <div class="box border-l-4 border-yellow-500 lg:col-span-2">
                <h4>⚙️ Preços, Taxas e Status</h4>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                    <input type="number" id="v-p" class="input-adm" placeholder="Preço P">
                    <input type="number" id="v-m" class="input-adm" placeholder="Preço M">
                    <input type="number" id="v-g" class="input-adm" placeholder="Preço G">
                    <input type="number" id="v-taxa" class="input-adm" placeholder="Taxa Entrega">
                </div>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <input type="text" id="v-cupom" class="input-adm" placeholder="Código Cupom">
                    <input type="number" id="v-desc" class="input-adm" placeholder="Valor Desconto R$">
                </div>
                <div class="flex gap-2">
                    <button onclick="salvarConfig()" class="flex-1 bg-yellow-500 text-black py-4 rounded-xl font-black text-xs uppercase">Salvar Configurações</button>
                    <button id="btn-loja" onclick="toggleLoja()" class="flex-1 py-4 rounded-xl font-black text-xs uppercase text-white"></button>
                    <input type="color" id="site-cor" onchange="mudarCor(this.value)" class="h-12 w-20 rounded-xl cursor-pointer bg-transparent border border-zinc-800">
                </div>
            </div>
        </div>

        <div class="box">
            <h4>📋 Gerenciar Itens Cadastrados</h4>
            <div id="lista-gerenciar" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-3"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDP-I5zYn9gVIMgNLFULIQTHypi0CqmlwA",
            authDomain: "pizzaria-reis-173ab.firebaseapp.com",
            projectId: "pizzaria-reis-173ab",
            storageBucket: "pizzaria-reis-173ab.firebasestorage.app",
            messagingSenderId: "1051814435008",
            appId: "1:1051814435008:web:a596d3d67d7360e8fab525"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function admInit() {
            // Monitorar Analytics
            db.collection('analytics').doc('geral').onSnapshot(doc => {
                if(doc.exists) {
                    document.getElementById('ana-visitas').innerText = doc.data().visitas;
                    document.getElementById('ana-cliques').innerText = doc.data().cliques;
                }
            });

            // Carregar Configurações Atuais
            db.collection('config').doc('precos').get().then(doc => {
                if(doc.exists) {
                    document.getElementById('v-p').value = doc.data().p;
                    document.getElementById('v-m').value = doc.data().m;
                    document.getElementById('v-g').value = doc.data().g;
                }
            });
            db.collection('config').doc('identidade').get().then(doc => {
                if(doc.exists) {
                    document.getElementById('v-taxa').value = doc.data().taxa;
                    document.getElementById('v-cupom').value = doc.data().cupomNome;
                    document.getElementById('v-desc').value = doc.data().cupomValor;
                }
            });

            // Monitorar Loja e Promo
            db.collection('config').doc('geral').onSnapshot(doc => {
                const aberto = doc.exists ? doc.data().aberto : false;
                const btn = document.getElementById('btn-loja');
                btn.innerText = aberto ? "LOJA ABERTA" : "LOJA FECHADA";
                btn.className = aberto ? "flex-1 bg-green-600 py-4 rounded-xl font-black text-xs uppercase" : "flex-1 bg-red-600 py-4 rounded-xl font-black text-xs uppercase";
            });

            db.collection('cardapio').orderBy('data','desc').onSnapshot(snap => {
                const list = document.getElementById('lista-gerenciar');
                list.innerHTML = snap.docs.map(doc => {
                    const i = doc.data();
                    let cor = i.tipo === 'pizza' ? 'text-red-500' : (i.tipo === 'doce' ? 'text-pink-500' : 'text-zinc-500');
                    return `<div class="bg-black/40 p-3 rounded-xl border border-zinc-800 flex justify-between items-center">
                        <div><p class="text-[9px] font-black uppercase ${cor}">${i.tipo}</p><p class="text-xs font-bold uppercase">${i.nome}</p></div>
                        <button onclick="db.collection('cardapio').doc('${doc.id}').delete()" class="text-red-600 font-black text-[9px] hover:underline">X</button>
                    </div>`;
                }).join('');
            });
        }

        async function addProduto(tipo, pref) {
            const nome = document.getElementById(`${pref}-nome`).value;
            const desc = document.getElementById(`${pref}-desc`) ? document.getElementById(`${pref}-desc`).value : '';
            const preco = document.getElementById(`${pref}-preco`) ? parseFloat(document.getElementById(`${pref}-preco`).value) : 0;
            if(!nome) return alert("Digite o nome!");
            await db.collection('cardapio').add({ nome, tipo, desc, preco, data: new Date(), disponivel: true });
            document.getElementById(`${pref}-nome`).value = '';
            alert("Sucesso!");
        }

        async function setPromo(s) {
            await db.collection('config').doc('promocao').set({
                texto: document.getElementById('p-txt').value,
                inicio: document.getElementById('p-in').value,
                fim: document.getElementById('p-out').value,
                cor: document.getElementById('p-cor').value,
                ativo: s
            });
            alert("Promoção salva!");
        }

        async function salvarConfig() {
            await db.collection('config').doc('precos').set({ 
                p: parseFloat(document.getElementById('v-p').value), 
                m: parseFloat(document.getElementById('v-m').value), 
                g: parseFloat(document.getElementById('v-g').value) 
            });
            await db.collection('config').doc('identidade').set({ 
                taxa: parseFloat(document.getElementById('v-taxa').value), 
                cupomNome: document.getElementById('v-cupom').value.toUpperCase(), 
                cupomValor: parseFloat(document.getElementById('v-desc').value) 
            });
            alert("Configs salvas!");
        }

        async function toggleLoja() {
            const doc = await db.collection('config').doc('geral').get();
            await db.collection('config').doc('geral').set({ aberto: !doc.data().aberto });
        }

        async function mudarCor(c) { await db.collection('config').doc('visual').set({ corFundo: c }); }

        admInit();
    </script>
</body>
</html>
